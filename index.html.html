<!DOCTYPE html>
<html>
<head>
    <title>Insurance Renewal Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f8fbff);
        }

        .container {
            width: 80%;
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            color: #0d47a1;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1976d2;
        }

        .btn {
            grid-column: span 2;
            padding: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background: #0d47a1;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            background: #e8f5e9;
            color: #1b5e20;
        }

        @media(max-width: 700px) {
            form {
                grid-template-columns: 1fr;
            }

            .btn {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Insurance Renewal Prediction</h1>
    <p class="subtitle">Predict whether customer will renew policy next year</p>

    <form method="POST">

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="Age" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="Gender" required>
                {% for gender in gender_list %}
                    <option value="{{ gender }}">{{ gender }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>City</label>
            <select name="City" required>
                {% for city in city_list %}
                    <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>State</label>
            <select name="State" required>
                {% for state in state_list %}
                    <option value="{{ state }}">{{ state }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Annual Income</label>
            <input type="number" name="Annual_Income" required>
        </div>

        <div class="form-group">
            <label>Occupation</label>
            <select name="Occupation" required>
                {% for occupation in occupation_list %}
                    <option value="{{ occupation }}">{{ occupation }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Policy Type</label>
            <select name="Policy_Type" required>
                {% for policy in policy_type_list %}
                    <option value="{{ policy }}">{{ policy }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Sum Assured</label>
            <input type="number" name="Sum_Assured" required>
        </div>

        <div class="form-group">
            <label>Years With Company</label>
            <input type="number" name="Years_With_Company" required>
        </div>

        <div class="form-group">
            <label>Total Claims</label>
            <input type="number" name="Total_Claims" required>
        </div>

        <div class="form-group">
            <label>Claim Amount</label>
            <input type="number" name="Claim_Amount" required>
        </div>

        <div class="form-group">
            <label>Late Payment Count</label>
            <input type="number" name="Late_Payment_Count" required>
        </div>

        <div class="form-group">
            <label>Previous Renewals</label>
            <input type="number" name="Previous_Renewals" required>
        </div>

        <div class="form-group">
            <label>Satisfaction Score</label>
            <input type="number" name="Satisfaction_Score" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label>Auto Renewal Enabled</label>
            <select name="Auto_Renewal_Enabled" required>
                {% for auto in auto_renewal_list %}
                    <option value="{{ auto }}">{{ auto }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Agent Rating</label>
            <input type="number" step="0.1" name="Agent_Rating" min="1" max="5" required>
        </div>

        <div class="form-group">
            <label>Policy Year</label>
            <input type="number" name="Policy_Year" required>
        </div>

        <div class="form-group">
            <label>Policy Month</label>
            <input type="number" name="Policy_Month" min="1" max="12" required>
        </div>

        <button class="btn" type="submit">Predict Renewal</button>

    </form>

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
    {% endif %}

</div>

</body>
</html>
